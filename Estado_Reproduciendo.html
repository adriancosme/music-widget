<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OBS Stream Player Widget</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ffb4ab",
                      "on-surface-variant": "#ccc3d8",
                      "tertiary": "#c4c7c9",
                      "tertiary-container": "#646769",
                      "on-primary-fixed": "#25005a",
                      "primary-fixed-dim": "#d2bbff",
                      "inverse-primary": "#732ee4",
                      "primary-container": "#7c3aed",
                      "surface-variant": "#2d3449",
                      "on-background": "#dae2fd",
                      "secondary-fixed": "#acedff",
                      "on-tertiary": "#2d3133",
                      "tertiary-fixed-dim": "#c4c7c9",
                      "tertiary-fixed": "#e0e3e5",
                      "on-primary-fixed-variant": "#5a00c6",
                      "surface-dim": "#0b1326",
                      "on-tertiary-container": "#e4e6e8",
                      "surface-container-low": "#131b2e",
                      "on-secondary": "#003640",
                      "surface": "#0b1326",
                      "surface-container-lowest": "#060e20",
                      "background": "#0b1326",
                      "primary-fixed": "#eaddff",
                      "secondary": "#4cd7f6",
                      "secondary-container": "#03b5d3",
                      "on-primary": "#3f008e",
                      "surface-container": "#171f33",
                      "inverse-surface": "#dae2fd",
                      "on-secondary-container": "#00424e",
                      "surface-bright": "#31394d",
                      "surface-tint": "#d2bbff",
                      "outline": "#958da1",
                      "on-error-container": "#ffdad6",
                      "on-secondary-fixed": "#001f26",
                      "surface-container-high": "#222a3d",
                      "on-surface": "#dae2fd",
                      "error-container": "#93000a",
                      "on-secondary-fixed-variant": "#004e5c",
                      "inverse-on-surface": "#283044",
                      "on-error": "#690005",
                      "surface-container-highest": "#2d3449",
                      "on-primary-container": "#ede0ff",
                      "primary": "#d2bbff",
                      "outline-variant": "#4a4455",
                      "on-tertiary-fixed-variant": "#444749",
                      "secondary-fixed-dim": "#4cd7f6",
                      "on-tertiary-fixed": "#191c1e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "text-stack": "0.25rem",
                      "element-gap": "0.75rem",
                      "inline-gap": "0.5rem",
                      "container-padding": "1rem",
                      "widget-width": "320px"
              },
              "fontFamily": {
                      "time-code": ["Inter"],
                      "artist-name": ["Inter"],
                      "track-title": ["Inter"],
                      "metadata": ["Inter"]
              },
              "fontSize": {
                      "time-code": ["10px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                      "artist-name": ["13px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "400" }],
                      "track-title": ["16px", { "lineHeight": "20px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                      "metadata": ["11px", { "lineHeight": "14px", "letterSpacing": "0.04em", "fontWeight": "500" }]
              }
            }
          }
        }
    </script>
<style>
        /* Equalizer Animation */
        @keyframes eq-pulse {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .eq-bar {
            transform-origin: bottom;
            animation: eq-pulse 1s ease-in-out infinite;
        }
        .eq-bar:nth-child(2) { animation-duration: 1.2s; animation-delay: 0.1s; }
        .eq-bar:nth-child(3) { animation-duration: 0.8s; animation-delay: 0.3s; }
        .eq-bar:nth-child(4) { animation-duration: 1.1s; animation-delay: 0.2s; }

        /* Marquee Animation */
        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee-scroll 12s linear infinite;
        }

        /* Glassmorphism setup for stream background simulation */
        body {
            background-image: radial-gradient(circle at 50% 50%, #171f33 0%, #060e20 100%);
            /* Pattern to simulate a stream overlay context */
            background-size: 20px 20px;
            background-image: repeating-linear-gradient(45deg, #222a3d 0, #222a3d 1px, transparent 0, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8 text-on-surface antialiased">
<!-- Stream Player Widget -->
<div class="w-widget-width bg-surface/10 backdrop-blur-xl border border-white/10 rounded-xl p-inline-gap flex flex-col gap-inline-gap shadow-[0_8px_32px_rgba(0,0,0,0.4)] relative group overflow-hidden">
<!-- Subtle gradient background flare -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<div class="flex items-center gap-element-gap relative z-10 w-full">
<!-- Album Art -->
<div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 relative border border-white/5 shadow-[inset_0_0_10px_rgba(255,255,255,0.05)] bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A sleek, highly detailed digital album cover artwork. The image features glowing neon geometric shapes intertwining in a vast, dark, high-tech void. The color palette revolves around deep blacks, vibrant cyan, and electric purple. Studio quality rendering, futuristic aesthetic, polished glass textures." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBn0CuE2hZ5hXTzr17LyM5ShhjY5tCrF4OKR24-KywetaoSqurZnuCqpd9_4wAyeZX0Ulzy7N1BgbxTOpPn8Kb-3oWB1TWf5UKyUd14-ctTmWTVHSkS4DkjQyPtw9p9EBFNMbQrhHvhB1eKlBuRZ_EXKXKD0fp_qGb09YbMwGABqlos6BEfx6uO-9mSrvNqt7t3I4kCSf3wIT_1LEb0Sw2VupbAeEare018RS8Ft0HKQ7pIDZg0A_G5GyBDM-XiI7o5NJZHQueOjS0"/>
<!-- Inner glow overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent pointer-events-none"></div>
</div>
<!-- Metadata & Controls -->
<div class="flex flex-col justify-center flex-1 min-w-0 h-16 py-0.5">
<!-- Top Row: Status & Playback -->
<div class="flex items-center justify-between mb-1">
<!-- Status Indicator -->
<div class="flex items-center gap-1.5">
<div class="flex items-end gap-[2px] h-2.5 w-3">
<div class="w-[2px] bg-secondary rounded-t-sm h-full eq-bar"></div>
<div class="w-[2px] bg-secondary rounded-t-sm h-full eq-bar"></div>
<div class="w-[2px] bg-secondary rounded-t-sm h-full eq-bar"></div>
<div class="w-[2px] bg-secondary rounded-t-sm h-full eq-bar"></div>
</div>
<span class="font-time-code text-time-code text-secondary uppercase tracking-widest">Now Playing</span>
</div>
<!-- Mini Controls -->
<div class="flex items-center gap-1">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6">
<span class="material-symbols-outlined text-[18px]">skip_previous</span>
</button>
<!-- Active Pause Button with Glow -->
<button class="text-primary hover:text-white transition-colors flex items-center justify-center w-6 h-6 relative group/btn">
<div class="absolute inset-0 bg-primary/20 blur-md rounded-full opacity-50 group-hover/btn:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-[22px] drop-shadow-[0_0_8px_rgba(210,187,255,0.6)] relative z-10" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-6 h-6">
<span class="material-symbols-outlined text-[18px]">skip_next</span>
</button>
</div>
</div>
<!-- Track Info -->
<div class="flex flex-col relative w-full overflow-hidden mask-image:linear-gradient(to_right,black_80%,transparent_100%)]">
<!-- Scrolling Title -->
<div class="w-full overflow-hidden">
<div class="animate-marquee font-track-title text-track-title text-on-surface">
<span class="pr-8">Cybernetic Drift (Original Mix)</span>
<span class="pr-8">Cybernetic Drift (Original Mix)</span>
</div>
</div>
<!-- Artist Name -->
<div class="font-artist-name text-artist-name text-on-surface-variant truncate w-full pr-2">
                        Lumina Stream feat. Vertex
                    </div>
</div>
</div>
</div>
<!-- Progress Bar (Full Width within padding) -->
<div class="w-full h-1 bg-white/20 rounded-full relative z-10 group/progress cursor-pointer overflow-visible">
<div class="absolute left-0 top-0 h-full bg-gradient-to-r from-primary to-secondary rounded-full w-[45%]">
<!-- Scrub Thumb (Visible on hover) -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-2.5 h-2.5 bg-white rounded-full opacity-0 group-hover/progress:opacity-100 transition-opacity shadow-[0_0_8px_rgba(255,255,255,0.8)] pointer-events-none"></div>
</div>
</div>
</div>
</body></html>
